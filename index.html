<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock-Paper Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="options">
        <button>Stone</button>
        <button>Paper</button>
        <button>Scissor</button>
      </div>
      <div class="score-sec">
        <div class="score-card">
          <h2>You</h2>
          <p id="user-result">user choice</p>
          <p id="user-score">0</p>
        </div>
        <div class="score-card">
          <h2>Computer</h2>
          <p id="comp-result">comp choice</p>
          <p id="comp-score">0</p>
        </div>
      </div>
      <div class="btn-sec">
        <button id="result">Result</button>
        <button id="reset">Reset</button>
      </div>
      <h2 id="show-result">Game Result</h2>
    </div>
    <script src="main.js"></script>
  </body>
</html>
